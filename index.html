<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hydrograph Metrics Explorer (HME)</title>
    <meta name="description" content="Hydrograph Metrics Explorer (HME): a client-side web tool for timing- and shape-aware evaluation of hydrologic model simulations. All computation runs in your browser." />
    <meta property="og:title" content="Hydrograph Metrics Explorer (HME)" />
    <meta property="og:description" content="Timing- and shape-aware evaluation of hydrologic model simulations - beyond NSE and KGE. Client-side; your data never leaves the page." />
    <meta property="og:url" content="https://arshahvaran.github.io/hydrograph_metrics_explorer/" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#14161b" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <script>(function(){try{var t=localStorage.getItem("hme_theme");if(t!=="light"&&t!=="dark"){t="light";}document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","light");}})();</script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=STIX+Two+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
